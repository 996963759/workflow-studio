name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: workflow_studio_test
          POSTGRES_USER: workflow_studio
          POSTGRES_PASSWORD: workflow_studio_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workflow_studio -d workflow_studio_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://workflow_studio:workflow_studio_dev_password@127.0.0.1:5432/workflow_studio_test
      TEST_DATABASE_URL: postgresql+psycopg://workflow_studio:workflow_studio_dev_password@127.0.0.1:5432/workflow_studio_test
      RUN_JOB_QUEUE_BACKEND: thread

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r server/requirements.txt

      - name: Compile backend
        run: python -m compileall server/src server/scripts server/tests

      - name: Run unit tests
        run: python -m unittest discover server/tests

      - name: Check Alembic configuration
        run: python -m alembic current
