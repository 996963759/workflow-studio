services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow_studio}
      POSTGRES_USER: ${POSTGRES_USER:-workflow_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow_studio_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow_studio} -d ${POSTGRES_DB:-workflow_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: bitnami/kafka:4.0
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://workflow_studio:workflow_studio_dev_password@db:5432/workflow_studio}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-60}
      DASHSCOPE_MAX_POLL_SECONDS: ${DASHSCOPE_MAX_POLL_SECONDS:-90}
      ALIYUN_TTS_MODEL: ${ALIYUN_TTS_MODEL:-cosyvoice-v2}
      ALIYUN_IMAGE_MODEL: ${ALIYUN_IMAGE_MODEL:-wanx2.1-t2i-turbo}
      EXTERNAL_RAG_ENABLED: ${EXTERNAL_RAG_ENABLED:-false}
      PAISMART_BASE_URL: ${PAISMART_BASE_URL:-http://127.0.0.1:8080}
      PAISMART_TOKEN: ${PAISMART_TOKEN:-}
      PAISMART_TIMEOUT_SECONDS: ${PAISMART_TIMEOUT_SECONDS:-12}
      MODEL_CONFIG_SECRET: ${MODEL_CONFIG_SECRET:-workflow-studio-local-model-config-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      WORKSPACE_INVITATION_TTL_HOURS: ${WORKSPACE_INVITATION_TTL_HOURS:-168}
      RUN_JOB_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RUN_JOB_TOPIC: ${KAFKA_RUN_JOB_TOPIC:-workflow-studio-run-jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-workflow-studio-workers}
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "server.src.worker"]
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://workflow_studio:workflow_studio_dev_password@db:5432/workflow_studio}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-60}
      DASHSCOPE_MAX_POLL_SECONDS: ${DASHSCOPE_MAX_POLL_SECONDS:-90}
      ALIYUN_TTS_MODEL: ${ALIYUN_TTS_MODEL:-cosyvoice-v2}
      ALIYUN_IMAGE_MODEL: ${ALIYUN_IMAGE_MODEL:-wanx2.1-t2i-turbo}
      EXTERNAL_RAG_ENABLED: ${EXTERNAL_RAG_ENABLED:-false}
      PAISMART_BASE_URL: ${PAISMART_BASE_URL:-http://127.0.0.1:8080}
      PAISMART_TOKEN: ${PAISMART_TOKEN:-}
      PAISMART_TIMEOUT_SECONDS: ${PAISMART_TIMEOUT_SECONDS:-12}
      MODEL_CONFIG_SECRET: ${MODEL_CONFIG_SECRET:-workflow-studio-local-model-config-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      WORKSPACE_INVITATION_TTL_HOURS: ${WORKSPACE_INVITATION_TTL_HOURS:-168}
      RUN_JOB_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RUN_JOB_TOPIC: ${KAFKA_RUN_JOB_TOPIC:-workflow-studio-run-jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-workflow-studio-workers}
      RUN_JOB_WORKERS: ${RUN_JOB_WORKERS:-2}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
