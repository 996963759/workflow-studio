services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow_studio}
      POSTGRES_USER: ${POSTGRES_USER:-workflow_studio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow_studio_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/10-init-databases.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow_studio} -d ${POSTGRES_DB:-workflow_studio}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.0.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      RUN_EXECUTION_MODE: ${RUN_EXECUTION_MODE:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://workflow_studio:workflow_studio_dev_password@db:5432/workflow_studio}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-0.2}
      ADMIN_OVERVIEW_CACHE_TTL_SECONDS: ${ADMIN_OVERVIEW_CACHE_TTL_SECONDS:-20}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      MCP_GATEWAY_TIMEOUT_SECONDS: ${MCP_GATEWAY_TIMEOUT_SECONDS:-30}
      MCP_GATEWAY_AUTHORIZATION: ${MCP_GATEWAY_AUTHORIZATION:-}
      MCP_GATEWAY_TOKEN: ${MCP_GATEWAY_TOKEN:-}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:-}
      MCP_TOOL_TOKEN: ${MCP_TOOL_TOKEN:-}
      MCP_PROJECT_ID: ${MCP_PROJECT_ID:-}
      MCP_TENANT_CODE: ${MCP_TENANT_CODE:-}
      MCP_USER_ID: ${MCP_USER_ID:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-60}
      DASHSCOPE_MAX_POLL_SECONDS: ${DASHSCOPE_MAX_POLL_SECONDS:-90}
      ALIYUN_TTS_MODEL: ${ALIYUN_TTS_MODEL:-cosyvoice-v2}
      ALIYUN_IMAGE_MODEL: ${ALIYUN_IMAGE_MODEL:-wanx2.1-t2i-turbo}
      EXTERNAL_RAG_ENABLED: ${EXTERNAL_RAG_ENABLED:-false}
      PAISMART_BASE_URL: ${PAISMART_BASE_URL:-http://127.0.0.1:8080}
      PAISMART_TOKEN: ${PAISMART_TOKEN:-}
      PAISMART_TIMEOUT_SECONDS: ${PAISMART_TIMEOUT_SECONDS:-12}
      MODEL_CONFIG_SECRET: ${MODEL_CONFIG_SECRET:-workflow-studio-local-model-config-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      WORKSPACE_INVITATION_TTL_HOURS: ${WORKSPACE_INVITATION_TTL_HOURS:-168}
      RUN_JOB_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RUN_JOB_TOPIC: ${KAFKA_RUN_JOB_TOPIC:-workflow-studio-run-jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-workflow-studio-workers}
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "-m", "server.src.worker"]
    environment:
      APP_ENV: production
      RUN_EXECUTION_MODE: ${RUN_EXECUTION_MODE:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://workflow_studio:workflow_studio_dev_password@db:5432/workflow_studio}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-0.2}
      ADMIN_OVERVIEW_CACHE_TTL_SECONDS: ${ADMIN_OVERVIEW_CACHE_TTL_SECONDS:-20}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MCP_GATEWAY_URL: ${MCP_GATEWAY_URL:-}
      MCP_GATEWAY_TIMEOUT_SECONDS: ${MCP_GATEWAY_TIMEOUT_SECONDS:-30}
      MCP_GATEWAY_AUTHORIZATION: ${MCP_GATEWAY_AUTHORIZATION:-}
      MCP_GATEWAY_TOKEN: ${MCP_GATEWAY_TOKEN:-}
      MCP_GATEWAY_API_KEY: ${MCP_GATEWAY_API_KEY:-}
      MCP_TOOL_TOKEN: ${MCP_TOOL_TOKEN:-}
      MCP_PROJECT_ID: ${MCP_PROJECT_ID:-}
      MCP_TENANT_CODE: ${MCP_TENANT_CODE:-}
      MCP_USER_ID: ${MCP_USER_ID:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com}
      DASHSCOPE_TIMEOUT_SECONDS: ${DASHSCOPE_TIMEOUT_SECONDS:-60}
      DASHSCOPE_MAX_POLL_SECONDS: ${DASHSCOPE_MAX_POLL_SECONDS:-90}
      ALIYUN_TTS_MODEL: ${ALIYUN_TTS_MODEL:-cosyvoice-v2}
      ALIYUN_IMAGE_MODEL: ${ALIYUN_IMAGE_MODEL:-wanx2.1-t2i-turbo}
      EXTERNAL_RAG_ENABLED: ${EXTERNAL_RAG_ENABLED:-false}
      PAISMART_BASE_URL: ${PAISMART_BASE_URL:-http://127.0.0.1:8080}
      PAISMART_TOKEN: ${PAISMART_TOKEN:-}
      PAISMART_TIMEOUT_SECONDS: ${PAISMART_TIMEOUT_SECONDS:-12}
      MODEL_CONFIG_SECRET: ${MODEL_CONFIG_SECRET:-workflow-studio-local-model-config-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      WORKSPACE_INVITATION_TTL_HOURS: ${WORKSPACE_INVITATION_TTL_HOURS:-168}
      RUN_JOB_QUEUE_BACKEND: kafka
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_RUN_JOB_TOPIC: ${KAFKA_RUN_JOB_TOPIC:-workflow-studio-run-jobs}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-workflow-studio-workers}
      RUN_JOB_WORKERS: ${RUN_JOB_WORKERS:-2}
    volumes:
      - ./server/data:/app/server/data
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:
